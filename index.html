<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sincere 3D Apology</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: manipulation; }
        #ui {
            position: absolute; bottom: 15%; width: 100%; text-align: center;
            z-index: 10;
        }
        #noBtn { transition: all 0.2s ease; position: relative; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="bg-black/60 backdrop-blur-md border border-white/20 p-6 rounded-3xl inline-block mx-4 shadow-2xl">
            <h1 class="text-white text-2xl font-bold mb-2">I am truly sorry.</h1>
            <p class="text-gray-300 mb-6">I feel terrible. Can we talk?</p>
            <div class="flex gap-4 justify-center">
                <button onclick="accept()" class="bg-white text-black px-8 py-3 rounded-xl font-bold active:scale-95 transition-all">Forgive Me</button>
                <button id="noBtn" onmouseover="dodge()" onclick="dodge()" class="border border-white/30 text-white px-8 py-3 rounded-xl">No</button>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, bodyGroup;
        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 2, 3);
            scene.add(light);

            // Character
            bodyGroup = new THREE.Group();
            const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.5, 8, 16), new THREE.MeshStandardMaterial({ color: 0x334155 }));
            torso.position.y = 1;
            bodyGroup.add(torso);

            const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
            head.position.y = 0.5;
            torso.add(head);

            scene.add(bodyGroup);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(bodyGroup) bodyGroup.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        function dodge() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 150);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function accept() {
            document.body.innerHTML = `<div class="flex flex-col items-center justify-center h-screen bg-rose-500 text-white text-center p-6"><h1 class="text-6xl animate-bounce">💖</h1><h2 class="text-3xl font-bold mt-4">Thank You!</h2><p class="mt-2">I promise to do better.</p></div>`;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
